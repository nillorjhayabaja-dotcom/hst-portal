services:
  - type: web
    name: hst-portal-api
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: hst-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        value: https://hst-portal.rjabaja.workers.dev
      - key: FRONTEND_URL
        value: https://hst-portal.rjabaja.workers.dev
      - key: APP_URL
        value: https://hst-portal-api.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000
      - key: RATE_LIMIT_LOGIN_MAX
        value: 50
      - key: LOG_LEVEL
        value: info

databases:
  - name: hst-portal-db
    plan: starter
    databaseName: hst_portal
    user: postgres